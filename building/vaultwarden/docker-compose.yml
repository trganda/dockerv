services:
  nginx:
    image: nginx:latest
    container_name: vaultwarden-nginx
    restart: unless-stopped
    depends_on:
      - vaultwarden
    ports:
      - 443:443
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - vaultwarden-net

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://warden.example.com/vault/"
      SIGNUPS_ALLOWED: "false"
    volumes:
      - ./vw-data/:/data/
    networks:
      - vaultwarden-net

networks:
  vaultwarden-net: